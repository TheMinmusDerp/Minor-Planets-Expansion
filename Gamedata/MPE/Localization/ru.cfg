		#LOC_MPE_SCI_Lint-Mikey_Mag_SpaceL = Вокруг 68P имеется очень слабое магнитное поле, и это поле, вероятно, является остатком кометного образования из ещё протопланетного диска Кербола.
		
		#LOC_MPE_SCI_Geito_Mag = Хвост Гейто, по-видимому, генерирует некую форму магнитного поля, оно формирует ударную волну и кильватерный след, когда Гейто путешествует по системе.
		
		#LOC_MPE_SCI_Crokslev_Mag = У Крокселева нет магнитного поля, но, учитывая, насколько тесно он взаимодействует с магнитными полями планет-гигантов, вполне возможно, что на поверхности или внутри Крокселева имеется некоторое количество поляризованного материала.
		
		#LOC_MPE_SCI_Mracksis_Mag = У Мраксиса нет никакого заметного магнитного поля, но его красная окраска является результатом взаимодействия поверхностных льдов с солнечным ветром. Это означает, что хотя Мраксис и не оказывает прямого сопротивления солнечному ветру, он все же взаимодействует с ним.
		
		#LOC_MPE_SCI_KiKi_Mag = У Ки'Ки нет магнитных взаимодействий с Хавусом или Солнцем, хотя если она когда-то была кометой, то в какой-то момент своей истории она могла таковым обладать.
		
		#LOC_MPE_SCI_Kal_Mag = Честно говоря, я не знаю, чего мы ожидаем... Ну да, это важно проверить, но... я имею в виду, это Кел. Я знаю, я знаю, просто... о, подождите. Я получил данные. Да, видите? Ничего.
		
		#LOC_MPE_SCI_Flake_Mag = Честно говоря, было бы невероятно, почти новаторски, если бы этот маленький комочек ледяного пуха генерировал магнитное поле. К сожалению, хоть и неудивительно, этого не происходит.
		
		#LOC_MPE_SCI_Lon_Mag = Лон иногда, кажется, подвергается воздействию ионных хвостов, вырывающихся из слабой ионосферы Содена, и эти хвосты, кажется, разлетаются довольно хаотично. Однако сам Лон, похоже, не реагирует какими-либо собственными магнитными или ионными свойствами.
		
		#LOC_MPE_SCI_Archae_Mag_SpaceH = Из двух объектов в системе Эрво, Арки с меньшей вероятностью обладает магнитным полем. Пока что, похоже, нет.
		#LOC_MPE_SCI_Archae_Mag_SpaceL = Поразительно, но на поверхности, похоже, существуют небольшие области, генерирующие локализованные магнитные поля. Это похоже на активность, наблюдаемую на Муне, что придает столь чужеродной системе странную близость.
		
		// Atmosphere Analysis
		#LOC_MPE_SCI_Ervo_Atmo_FlightH = Кажется, в верхних слоях атмосферы Эрво гораздо больше кислорода, возможно, потому что здесь он меньше реагирует с чем-либо? Вне зависимости от причин подобной концентрации, ЦУП нервничает из-за перспективы контакта поверхностей корабля с чистым кислородом.
		#LOC_MPE_SCI_Ervo_Atmo_FlightL = Уровень кислорода снижается, вероятно, потому, что поверхность поглощает большую часть кислорода в процессе окисления. Однако, похоже, он никогда не исчезает на любой высоте.
		#LOC_MPE_SCI_Ervo_Atmo_Landed = Кислородно-азотная атмосфера Эрво почти отражает атмосферу Кербина, который находится так далеко отсюда. Однако эта концентрация кислорода, безусловно, токсична. Быстрый вдох может не навредить, или... может быть, навредить очень сильно. Это может зависеть только от того, сколько именно вы вдохнёте от этого горького воздуха Эрво.
		#LOC_MPE_SCI_Ervo_Atmo_Splash = Из этих озер исходит своего рода... кислородный пар. Это довольно экзотическая особенность, хотя, похоже, она подразумевает, что кислород в этих озерах попал сюда из более отдаленных мест, чем экватор, по рекам. Эти озера лучше было бы назвать «морями».
		
