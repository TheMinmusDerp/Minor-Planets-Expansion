	en-us
	{
		// Archae
		#LOC_MPE_Archae_Name = Archae^N
		#LOC_MPE_Archae_Desc = Archae is the small moon of Ervo. Not much about Archae is known as its existence only recently came into the category of "things the Kerbal Astronomical Society are pretty sure exist." The reason for this is a result of its dark coloration, giving it the rank of "things the Kerbal Astronomical Society think are ominous."
		#LOC_MPE_Archae_Biome_LF = Lowland Flats
		#LOC_MPE_Archae_Biome_HF = Highland Flats
		#LOC_MPE_Archae_Biome_GC = Valles Pontem
		#LOC_MPE_Archae_Biome_Ca = Valleys
		#LOC_MPE_Archae_Biome_GM = Montes Regius
		#LOC_MPE_Archae_Biome_Crag = Crags
		#LOC_MPE_Archae_Biome_B = Circulum Planitia
		#LOC_MPE_Archae_Biome_BF = Mare Divinitatem
		#LOC_MPE_Archae_Biome_SF = Mare Limus
		#LOC_MPE_Archae_Biome_LG = Lonely Glacier
		#LOC_MPE_Archae_Biome_Crac = Occultatum Planitia
		
		// Crokslev
		#LOC_MPE_Crokslev_Name = Crokslev^N
		#LOC_MPE_Crokslev_Desc = Crokslev is the largest known "centaur," a class of asteroids that wander around the orbits of the outer planets, and do so choatically. Not much is known about 11909 Crokslev, its neighboring planets are far more attractive to sight-seeing astronomers. However, the recent discovery of rings around this object made headlines, and astronomers are starting to occasionally glance at this unassuming dot.
		#LOC_MPE_Crokslev_Biome_P = Polar Lowlands
		#LOC_MPE_Crokslev_Biome_M = Midlands
		#LOC_MPE_Crokslev_Biome_H = Highlands
		#LOC_MPE_Crokslev_Biome_C = Craters
		#LOC_MPE_Crokslev_Biome_R = Rubble Fields
		#LOC_MPE_Crokslev_Biome_BC = Holslev Crater
		#LOC_MPE_Crokslev_Biome_CeP = Monte Crokel
		#LOC_MPE_Crokslev_Biome_F = Fissures
		#LOC_MPE_Crokslev_Biome_SP = Southern Rubble Pile
		#LOC_MPE_Crokslev_Biome_OC = Egress Crater
		#LOC_MPE_Crokslev_Biome_SC = Satellite Craters
		
		// Edas
		#LOC_MPE_Edas_Name = 433 Edas^N
		#LOC_MPE_Edas_Desc = Edas is a very small, stony asteroid. It's been noted as a potential destination for robotic explorers, maybe for a brief visit on the way someplace further out. Edas is unthreatening enough that it has been suggested as a fun place to send Kerbals for a brief bit of camping practice.
		#LOC_MPE_Edas_Biome_PC = Miros Crater
		#LOC_MPE_Edas_Biome_C = Powdered Crater
		#LOC_MPE_Edas_Biome_S = Surface
		
		// Ervo
		#LOC_MPE_Ervo_Name = Ervo^N
		#LOC_MPE_Ervo_Desc = Ervo is a massive object in the outer reaches of the system. Ervo's discovery and size, comparable to other objects in its region, ultimately led to the creation of the term "dwarf planet." Numerous fight-related injuries are now directly tied to Ervo's existence. Ervo's nature leaves few unpuzzled: its tenuous atmosphere has an usually high concentration of oxygen, and "why" is a matter of considerable debate. In fact, the conditions could be suitable for stable pools of liquid oxygen to exist on Ervo's surface. Any such "LOx lakes" would be highly chemically reactive, and potentially incredibly dangerous... but what are the chances of such a thing existing in nature anyway?
		#LOC_MPE_Ervo_Biome_LF = Lowland Flats
		#LOC_MPE_Ervo_Biome_HF = Highland Flats
		#LOC_MPE_Ervo_Biome_M = Mountains
		#LOC_MPE_Ervo_Biome_G = Glaciers
		#LOC_MPE_Ervo_Biome_IF = Ice Fields
		#LOC_MPE_Ervo_Biome_P = Oxygen Ice Caps
		#LOC_MPE_Ervo_Biome_CB = Coastal Basins
		#LOC_MPE_Ervo_Biome_OL = Oxygen Lakes
		#LOC_MPE_Ervo_Biome_IB = Mare Puritas
		#LOC_MPE_Ervo_Biome_RGF = Aspero Planitia
		#LOC_MPE_Ervo_Biome_SGF = Cessabit Planitia
		#LOC_MPE_Ervo_Biome_MGF = Iuvenis Planitia
		
		// Flake
		#LOC_MPE_Flake_Name = Flake^N
		#LOC_MPE_Flake_Desc = Flake is a very small moon around Mracksis. Despite its small size the moon was discovered on the first major telescope observations of Mracksis due to its incredibly high albedo, next to its parent’s rather dim coloring. It is suspected that Flake is covered in a layer of “fresh powder” but the origins of such powders if they do exist is unknown.
		#LOC_MPE_Flake_Biome_I = Fresh Powder
		#LOC_MPE_Flake_Biome_C = Cracks
		#LOC_MPE_Flake_Biome_P = Poles
		
		// Geito
		#LOC_MPE_Geito_Name = 1P-Geito^N
		#LOC_MPE_Geito_Desc = Geito is the exact object that comes to the average Kerbal's mind when they think of a comet. They think of brilliant streaks across the night sky, and most would be surprised to hear that comets are in reality small chunks of ice. Despite its small size Geito, which was named after its discoverer, is actually one of the largest comets known.
		#LOC_MPE_Geito_Biome_L = Lowlands
		#LOC_MPE_Geito_Biome_M = Midlands
		#LOC_MPE_Geito_Biome_H = Highlands
		
		// Havous
		#LOC_MPE_Havous_Name = Havous^N
		#LOC_MPE_Havous_Desc = Havous is an attention-grabber. Every new discovery relating to Havous seem make the clear point that Havous is a very unusual world. From its squished shape, tight rings, and a strikingly blue patch, Havous has more referred to as "The Deep Space Jewel."
		#LOC_MPE_Havous_Biome_Sc = Mare Transformatio
		#LOC_MPE_Havous_Biome_PZ = Point Zero
		#LOC_MPE_Havous_Biome_MT = Montes Timor
		#LOC_MPE_Havous_Biome_Sl = Slopes
		#LOC_MPE_Havous_Biome_L = Lowlands
		#LOC_MPE_Havous_Biome_H = Highlands
		#LOC_MPE_Havous_Biome_M = Mountains
		#LOC_MPE_Havous_Biome_G = Glaciers
		#LOC_MPE_Havous_Biome_IF = Ice Fields
		#LOC_MPE_Havous_Biome_VP = Valles Parvus
		#LOC_MPE_Havous_Biome_P = Poles
		
		// Kal
		#LOC_MPE_Kal_Name = Kal^N
		#LOC_MPE_Kal_Desc = Kal is a lumpy little moon that hangs out near the rings of Havous. The bright rings, and equally bright Havous, made it difficult to spot the small moon. Never the less, Kal was discovered and given a very important almost-footnote in the morning newspaper.
		#LOC_MPE_Kal_Biome_L = Lowland Rubble
		#LOC_MPE_Kal_Biome_M = Mounds
		#LOC_MPE_Kal_Biome_P = Ring Powder Peaks
		
		// Ki'Ki
		#LOC_MPE_KiKi_Name = Ki'Ki^N
		#LOC_MPE_KiKi_Desc = Ki'Ki was the first moon known to orbit Havous, its orbit seems to suggest it was captured. There is debate in the planetary science community on the nature of Ki'Ki's origin. Some say Ki'Ki formed from the rings of Havous and migrated outwards, however the more widely accepted answer is that Ki'Ki was once a comet. If Ki'Ki is an ex-comet, it should be signifantly easier to chase down than the others; although, it's not exactly nearby.
		#LOC_MPE_KiKi_Biome_CoP = Contact Point
		#LOC_MPE_KiKi_Biome_MaL = Major Lobe
		#LOC_MPE_KiKi_Biome_MiL = Minor Lobe
		
		// Lint-Mikey
		#LOC_MPE_Lint-Mikey_Name = 68P-Lint/Mikey^N
		#LOC_MPE_Lint-Mikey_Desc = Lint Kerman discovered an object wondering in an elliptical orbit, and reported that it *could* be a comet, though not nearly as impressive as Geito's. The object's existence was confirmed by Mikey Kerman, who also confirmed its cometary nature when he observed a small coma around the object. The object now bares both of their names, and was the first short-period comet ever discovered. Due to its (relatively) close nature many agencies believe that it may be a good target, it has been warned however that microgravity may make navigation around it difficult.
		#LOC_MPE_Lint-Mikey_Biome_L = Lowlands
		#LOC_MPE_Lint-Mikey_Biome_M = Midlands
		#LOC_MPE_Lint-Mikey_Biome_H = Highlands
		
		// Lon
		#LOC_MPE_Lon_Name = Lon^N
		#LOC_MPE_Lon_Desc = Lon is the very lonely moon of a very lonely dwarf. Its discovery is deemed a miracle due its distance and small size. Astronomers, but more commonly astrologists, take comfort in the notion that Soden is <color=#b3afd6>not entirely alone out there.</color>
		#LOC_MPE_Lon_Biome_Crac = Cracks
		#LOC_MPE_Lon_Biome_M = Mounds
		#LOC_MPE_Lon_Biome_Crat = Craters
		#LOC_MPE_Lon_Biome_IF = Ice Fields
		
		// Mracksis
		#LOC_MPE_Mracksis_Name = Mracksis^N
		#LOC_MPE_Mracksis_Desc = Mracksis is a very red dwarf planet living around the same region of space as Havous. The vibrant red coloration is the result of tholins building up on the surface. The reason why Mracksis possesses such a high global concentration of tholins, while Havous does not, is a mystery. Unfortunately Mracksis does not get the same amount of attention as other objects in its neighborhood.
		#LOC_MPE_Planets_Mracksis_descriptionAlt = Mracksis is a particularly red dwarf planet. The vibrant red coloration is the result of tholins building up on the surface. The reason why Mracksis possesses such a high global concentration of tholins, while other objects do not, is a mystery. Unfortunately Mracksis does not get the same amount of attention as other distant objects, missions to this region take years to travel, perhaps now is the time to finally send a visitor? // Couldn't find where it is used, so currently it uses old tag system
		#LOC_MPE_Mracksis_Biome_M = Maria
		#LOC_MPE_Mracksis_Biome_LM = Mare Hebes
		#LOC_MPE_Mracksis_Biome_IF = Ice Fields
		#LOC_MPE_Mracksis_Biome_G = Glaciers
		#LOC_MPE_Mracksis_Biome_P = Allicere Planitia
		#LOC_MPE_Mracksis_Biome_TF = Tholin Fields
		
		// Soden
		#LOC_MPE_Soden_Name = Soden^N
		#LOC_MPE_Soden_Desc = Soden marks the boldest ambitions of many space programs. It's the furthest frontier that could ever be hoped to reach with current technologies, and it's not going to stick around for long. The small, lonely dwarf floats out beyond even Ervo. It's said that from this distant vantage point, our home is but a pale dot.
		#LOC_MPE_Soden_Biome_IP = Ice Plains
		#LOC_MPE_Soden_Biome_MaG = Major Glaciers
		#LOC_MPE_Soden_Biome_MiG = Minor Glaciers
		#LOC_MPE_Soden_Biome_MaC = Major Canyons // Mayor?
		#LOC_MPE_Soden_Biome_MiC = Minor Canyons
		#LOC_MPE_Soden_Biome_TS = Tiger Stripes
		#LOC_MPE_Soden_Biome_SP = South Pole
		#LOC_MPE_Soden_Biome_L = Liber Planitia
		
		// Vant
		#LOC_MPE_Vant_Name = Vant^N
		#LOC_MPE_Vant_Desc = Vant is the largest asteroid in the entire solar system, and the basis by which the Alphabetic Asteroid Classification System (AACS) was made, quite controversially, with Vant being the exclusive member of the "V-Class" asteroids. Vant seems to be mainly made up of ice, suggesting it did not form in the warmer region it lives in today. Vant has been proposed as a main target in an "asteroid belt grand tour" mission multiple times.
		#LOC_MPE_Vant_Biome_H = Highlands
		#LOC_MPE_Vant_Biome_L = Lowlands
		#LOC_MPE_Vant_Biome_V = Valleys
		#LOC_MPE_Vant_Biome_Crat = Craters
		#LOC_MPE_Vant_Biome_Crag = Crags
		#LOC_MPE_Vant_Biome_M = Lei Mons
		#LOC_MPE_Vant_Biome_E = Equatorial Basin
		
		// Zore
		#LOC_MPE_Zore_Name = Zore^N
		#LOC_MPE_Zore_Desc = Zore is one of the most massive objects in the main asteroid belt. Zore's small size and high mass has lead to the conclusion that Zore is mostly made of metal, making it the largest metallic asteroid known in the entire system. It's been concluded that Zore may be the core of a protoplanet that was shattered early in the solar system's history. Though scientists can only speculate what that young planet Zore came from may have been like, most agree it's a shame that they can't identify the other parts of it.
		#LOC_MPE_Zore_Biome_ML = Metal Lowlands
		#LOC_MPE_Zore_Biome_RL = Rocky Lowlands
		#LOC_MPE_Zore_Biome_RH = Rocky Highlands
		#LOC_MPE_Zore_Biome_C = Craters
		#LOC_MPE_Zore_Biome_MC = Major Craters
		#LOC_MPE_Zore_Biome_CF = Craggle Field

		// Minor Planet Numbers
		#LOC_MPE_Vant_Name_Alt = 2 Vant^N
		#LOC_MPE_Zore_Name_Alt = 18 Zore^N
		#LOC_MPE_Edas_Name_Alt = Edas^N
		#LOC_MPE_Soden_Name_Alt = 90377 Soden^N
		#LOC_MPE_Lon_Name_Alt = 90377 (1) Lon^N
		#LOC_MPE_Havous_Name_Alt = 136108 Havous^N
		#LOC_MPE_Kal_Name_Alt = 136108 (1) Kal^N
		#LOC_MPE_KiKi_Name_Alt = 136108 (2) Ki'Ki^N
		#LOC_MPE_Mracksis_Name_Alt = 136472 Mracksis^N
		#LOC_MPE_Flake_Name_Alt = 136472 (1) Flake^N
		#LOC_MPE_Ervo_Name_Alt = 136199 Ervo^N
		#LOC_MPE_Archae_Name_Alt = 136199 (1) Archae^N
		
		// Surface Sample
		#LOC_MPE_SCI_KiKi_Sample_CoP = The rocks here are quite tough, it would seem that the material here was compressed heavily when the two lobes came together. You dread having to tell mission control that you broke your sample drill. However, it would seem that both lobes are very similar in composition, they may have formed from the exact same cloud.
		#LOC_MPE_SCI_KiKi_Sample_Landed = You're able to easily gather a large regolith sample in the microgravity. Ki'Ki's surface is mainly comprised of various ices and tholins.
		
		#LOC_MPE_SCI_Kal_Sample_L = Kal's lowlands have a very diverse surface, you can barely decide on which rock to choose. The variety of ice, rock, and even some metallic material implies that Kal came together from loose material not long after the collision that made Havous into the strange world it is today.
		#LOC_MPE_SCI_Kal_Sample_M = The material that makes up these large bumps is almost entirely ice. These solid chunks of material might have at one point been moonlets within Havous' rings before merging with Kal as it moved to its present position.
		#LOC_MPE_SCI_Kal_Sample_P = This material is flaky and soft, it's definetly material fresh from Havous' rings. You ask mission control if you can build your own personal ring system with this material, only to get an annoyed groan in response.
		
		#LOC_MPE_SCI_Flake_Sample_Landed = This region is hard ice, and would be slippery too, if the gravity wasn't so low.
		#LOC_MPE_SCI_Flake_Sample_I = These highlands are pure, flaky powder, you make sure to take precautions to ensure the sample doesn't melt instantly. This material is very similar to that found in rings. Flake may have formed from a long gone system of rings around Mracksis.
		
		#LOC_MPE_SCI_Lon_Sample_Landed = There's a strangely high amount of metal flakes in the ice, which accounts for Lon's strange coloration. The origin of this material however simply creates more questions than answers.
		#LOC_MPE_SCI_Lon_Sample_Crat = These craters are coated in a layer of rocky dust.
		
		#LOC_MPE_SCI_Mracksis_Sample_Landed = You'd be hard pressed to find something that wasn't tholins here. This raises questions on how such a massive amount of tholins formed.
		#LOC_MPE_SCI_Mracksis_Sample_M = There's a fair amount of rock in the ice samples here, and the materials are quite compressed too. It's a wonder these impacts didn't form rings or any large moons.
		#LOC_MPE_SCI_Mracksis_Sample_IF = Part of you is relieved to find an area that isn't so red. This ice may be newer material, maybe even delivered through the same impacts that so visibly scar the surface.
		#LOC_MPE_SCI_Mracksis_Sample_P = The material here is similar to the majority of Mracksis' surface. It's slightly more compressed here however, this very well could be an impact zone.
		#LOC_MPE_SCI_Mracksis_Sample_LM = The material here is similar to the majority of Mracksis' surface. It's slightly more compressed here however, this very well could be an impact zone.
		
		#LOC_MPE_SCI_Havous_Sample_Landed = This sample is mainly ice, with some trace amounts of rock.
		#LOC_MPE_SCI_Havous_Sample_Sc = This area is mostly rocky, but there is still a fair amount of ice.
		#LOC_MPE_SCI_Havous_Sample_PZ = This is a region of almost purely metamorphic, rocky material. The deposit was likely a direct result of the impact event, and its presence in the middle of the scar, suggests this was the point of impact.
		#LOC_MPE_SCI_Havous_Sample_G = The sample is entirely ice. There's a strange absense of rocky material, or even the tholins that seem so common in this region of the solar system. Perhaps the glacier's material recycles somehow.
		#LOC_MPE_SCI_Havous_Sample_MT = This sample is mainly ice, but it's more compressed here.
		
		#LOC_MPE_SCI_Archae_Sample_Landed = This sample is ice, but its been dirtied by darker material. It's a bit sticky.
		#LOC_MPE_SCI_Archae_Sample_Crag = This sample is rocky, in fact, it was quite hard to remove.
		#LOC_MPE_SCI_Archae_Sample_BF = The ice here is compressed, one could reasonably conclude this to be an impact zone.
		#LOC_MPE_SCI_Archae_Sample_SF = The ice here is compressed, one could reasonably conclude this to be an impact zone.
		#LOC_MPE_SCI_Archae_Sample_B = The ice here is softer and smoother than on other regions of the planet.
		#LOC_MPE_SCI_Archae_Sample_GM = The sample contains an even amount of rock and ice.
		
		#LOC_MPE_SCI_Ervo_Sample_Landed = The sample is not as icy as you expected, in fact you're able to find some chunks that seem to be primarily rock. Any flakes of metallic material are completely rusted over.
		#LOC_MPE_SCI_Ervo_Sample_OL = The fact that you're holding oxygen liquid in your hand is astonishing. It's also beyond freezing so you don't hold onto it for very long. You remark that you should try breathing underoxygen here, only to realize that your joke might result in some panic for mission control in a few hours when your signal reaches them.
		#LOC_MPE_SCI_Ervo_Sample_CB = This area contains some fine salts and a lot of water ice. This was likely submerged, but Ervo's oxygen lakes seem to be disappearing, and relatively quickly at least on geologic timescales.
		#LOC_MPE_SCI_Ervo_Sample_P = This area is mainly frozen oxygen and water ice. There's a fair amount of fine salts as well.
		#LOC_MPE_SCI_Ervo_Sample_IB = The sample has a wide diversity of different ices, some rocky powder, and some crusty rust. It could be that a comet or similar object with a large oxygen component impacted this point and delivered the overabundance oxygen to Ervo. However that just raises more questions about why such an object would've existed.
		#LOC_MPE_SCI_Ervo_Sample_M = There's a fair amount of rock here. These mountains seem to suggest that Ervo is geologically active.
		#LOC_MPE_SCI_Ervo_Sample_RGF1 = The ice here is layered, and the upper layers are fragile. These glaciers may be cells formed by movement in a small subsurface ocean under this region.
		#LOC_MPE_SCI_Ervo_Sample_RGF2 = While collecting a sample, you feel the ground shift. You begin to collect the sample faster.
		#LOC_MPE_SCI_Ervo_Sample_SGF = The ice here is layered, and the upper layers are fragile. These glaciers may be cells formed by movement in a small subsurface ocean under this region.
		#LOC_MPE_SCI_Ervo_Sample_MGF = The ice here is layered, and the upper layers are fragile. These glaciers may be cells formed by movement in a small subsurface ocean under this region.
		
		#LOC_MPE_SCI_Soden_Sample_Landed = The sample is a mixture of ice and tholins, but the most striking feature is the color. Its alien beauty is both enthralling and for some reason a bit scary.
		#LOC_MPE_SCI_Soden_Sample_TS = There's a thin layer of powdery water ice here. Occasionally, you can see a flake slowly fall from the sky. This may have been the sight of large cryovolcanoes at some point in the past. Those subsurface oceans are almost certainly freezing over now.
		#LOC_MPE_SCI_Soden_Sample_MaG = The colors of the samples you take are striking. The tholins here are very diverse. 
		#LOC_MPE_SCI_Soden_Sample_MiG = The colors of the samples you take are striking. The tholins here are very diverse.
		#LOC_MPE_SCI_Soden_Sample_MaC1 = There's a layer of dark tholins, but brushing it away reveals a layer of water ice beneath.
		#LOC_MPE_SCI_Soden_Sample_MaC2 = There is layer of tholins here, but brushing it away reveals a layer of several types of ices beneath.
		
		#LOC_MPE_SCI_Crokslev_Sample_Landed = There's a lot of ice here, however there seems to be a high clay content.
		#LOC_MPE_SCI_Crokslev_Sample_P = The ice content was expected to shoot up here, however there's actually more clay and rock here than anything.
		#LOC_MPE_SCI_Crokslev_Sample_H = There's a good amount of ice in this region, this includes methane ice.
		#LOC_MPE_SCI_Crokslev_Sample_C = There's a fine dust in and around this crater, it wouldn't be hard to deduce the composition of the meteoroid that created it.
		#LOC_MPE_SCI_Crokslev_Sample_R = These irregular mounds all seem to have composition that is distinct from the area around them, they're even distinct relative to each other. Perhaps these mounds were at one point seperate objects that integrated into Crokslev's whole.
		#LOC_MPE_SCI_Crokslev_Sample_BC = The dust covering this craters surface is mostly rocky material, and it's quite dark. This material doesn't match that found in the rings at all.
		#LOC_MPE_SCI_Crokslev_Sample_CeP = There's less dust and more ice here, perhaps this region of the craters has held onto the most native material.
		#LOC_MPE_SCI_Crokslev_Sample_F = These deep gashes in Crokslev's surface provide insight into deeper layers of its makeup. It's reasonable to conclude based on these samples that Crokslev is undifferentiated.
		#LOC_MPE_SCI_Crokslev_Sample_OC = There's a fine white powder here, it's mostly water ice. It's composition is identical to that of the rings. This must be where the object that created the rings impacted Crokslev.
		#LOC_MPE_SCI_Crokslev_Sample_SC = The dust in this crater is identical to the other three craters nearby, perhaps they share an impact event.
		#LOC_MPE_SCI_Crokslev_Sample_SP = These mounds are identical to one another, they must all have the same origin. Though how the object broke up before landing on Crokslev is a mystery. Perhaps the object was broken up by an outer planet, like Sarnus or Urlum? That would imply Crokslev was once much closer to these major planets, perhaps even a moon at some point in its past.
		
		#LOC_MPE_SCI_Geito_Sample_L = There's quite a bit of activity in this region, so you make sure to grab the sample quickly. It's mostly water-ice, but closer analysis reveals nucleic acids!
		#LOC_MPE_SCI_Geito_Sample_M = The samples are mostly chunks of ice, but there are some rocky pebbles among them.
		#LOC_MPE_SCI_Geito_Sample_H = You're able to grab a piece of ice that began floating off the comet's surface after getting hit with a puff from your RCS pack, the surface level ice here seems loose.
		
		#LOC_MPE_SCI_Lint-Mikey_Sample_L = There's a large amount of rock and clays here, giving it a darker coloration than the rest of the comet. Ignoring some regional discrepancies, it would seem this object has a fairly consistant composition.
		#LOC_MPE_SCI_Lint-Mikey_Sample_M = The ice here is dirtied by rock and other materials, you take the time to pick out the rocks from the sample so it can be nice and clean. You realize your mistake in changing the composition of the sample and grab another chunk.
		#LOC_MPE_SCI_Lint-Mikey_Sample_H = The ices here have a large clay component, giving it a red ting.
		
		#LOC_MPE_SCI_Zore_Sample_ML = The surface here is covered with large chunks of metal and metallic dust, you make sure to take a good varity of samples. Most of the metal is nickle and iron, but there is some rocky dust scattered around.
		#LOC_MPE_SCI_Zore_Sample_RL = The samples are mostly chunks of rock, with very trace amounts of shiny metals scattered around. This material may be what remains of the smaller asteroids that made the two major craters nearby.
		#LOC_MPE_SCI_Zore_Sample_RH = The rock layer doesn't go very deep before Zore's signature metallic composition is found again. This surface material might not even originally be from Zore, but rather from subsequent impacts by lighter, rockier asteroids.
		#LOC_MPE_SCI_Zore_Sample_C = There's a fine layer of dust, it seems that smaller meteroids here were nearly completely disintegrated, leaving only a thin layer of fine powder in a small crater, while the rest of the material was likely completely lost to the void of space.
		#LOC_MPE_SCI_Zore_Sample_MC = These massive bowls expose a region of almost pure iron, among some flakey dust. It's quite difficult to remove a sample even with the help of tools.
		#LOC_MPE_SCI_Zore_Sample_CF = This chaotic region seems to have an even mixture of rocky and metallic material.
		
		#LOC_MPE_SCI_Vant_Sample_L = There is an icy layer beneath the rocks and dust, it's quite deep, but it does prove directly that Vant is indeed, mainly ice.
		#LOC_MPE_SCI_Vant_Sample_H = These polar regions seem to have a thinner rock layer than the rest of Vant, in fact, some areas have ice on the surface!
		#LOC_MPE_SCI_Vant_Sample_V = These canyons are mostly silicates, but also have a large ice component as well.
		#LOC_MPE_SCI_Vant_Sample_Crat = The dust in these craters can perhaps be used to deduce the type of class of asteroid that created them.
		#LOC_MPE_SCI_Vant_Sample_Crag = The samples here are jagged piles of rubble, perhaps this is the final resting place of low-velocity "rubble-pile" asteroid.
		#LOC_MPE_SCI_Vant_Sample_M = This ancient cryovolcano is coated in a rocky-icy mush, which could be ancient ejecta. This is the closest to the Sun a cryovolcano has ever been found.
		#LOC_MPE_SCI_Vant_Sample_E = This region is mainly rock. The surface is quite smooth, with very little debris.
		
		#LOC_MPE_SCI_Edas_Sample_S = There's a distinct lack of loose material, so you have to chip a piece off of Edas. The sample is entirely silicates.
		#LOC_MPE_SCI_Edas_Sample_C = Breaking a piece off in this region shows that it's nearly identical to the rest of Edas in composition, most foreign material was likely blown into space.
		#LOC_MPE_SCI_Edas_Sample_PC = There's a trace amount of carbonaceous material here as an extremely thin layer on the crater's bowl. You scrape off a bit of the powder, this could be material from the asteroid that made this crater.
		
		// Crew Report
		#LOC_MPE_SCI_KiKi_Crew_SpaceL = As you orbit, Ki'Ki's surface slowly approaches and then recedes as you pass over the lobes. You make sure to triple check your telemetry, you wouldn't want to crash.
		#LOC_MPE_SCI_KiKi_Crew_SpaceH = Ki'Ki's odd shape makes it look as though it's two objects close together from some angles, and a bone-shape from other angles. You make note of the idea that this may be a contact-binary.
		#LOC_MPE_SCI_KiKi_Crew_CoP = The two lobes of Ki'Ki take up large portions of the sky on either side of your craft, the thought of Ki'Ki's lobes suddenly collapsing in on you crosses your mind. You speed up your surface operations.
		#LOC_MPE_SCI_KiKi_Crew_Landed = Ki'Ki's surface is quite chaotic, you had trouble finding flat ground to land on.
		
		#LOC_MPE_SCI_Kal_Crew_SpaceH = Kal's diamond shape and proximity to Havous' rings makes it look like a very appealing location. You make sure to take a picture at your earliest convenience.
		#LOC_MPE_SCI_Kal_Crew_SpaceL = You notice several large boulders, it seems finding level ground for a landing may be difficult. 
		#LOC_MPE_SCI_Kal_Crew_L = You feel as though you could've found a better place to touch down, it's so rugged here.
		#LOC_MPE_SCI_Kal_Crew_M = The ship's engine evaporated some of the ice below the ship, but otherwise this is a nice vantage point.
		#LOC_MPE_SCI_Kal_Crew_P = You noticed while landing that the ground here gave a little bit. This region must not be very solid.
		
		#LOC_MPE_SCI_Havous_Crew_SpaceH1 = Havous is seems quite beautiful, you cross your fingers for a closer look.
		#LOC_MPE_SCI_Havous_Crew_SpaceH2 = The bright colors and arching rings, along with Havous' famous oblate shape, create a beautiful, if not unnerving sight. All signs point towards an ancient disaster.
		#LOC_MPE_SCI_Havous_Crew_SpaceL1 = The rings are very pretty up close, but you're nervous whenever you hear a small ice particle hit the side of your craft.
		#LOC_MPE_SCI_Havous_Crew_SpaceL2 = You hear a thunk and check for any holes in the ship. There's no hole, but you're startled none the less.
		#LOC_MPE_SCI_Havous_Crew_Landed = Looking out the window makes you feel a little sickly, the sky is visibly moving.
		#LOC_MPE_SCI_Havous_Crew_MT = The view out the window shows a chaotic landscape, you're very eager to get out and stretch your legs.
		#LOC_MPE_SCI_Havous_Crew_Sc = The targeted landing to get to this ancient impact zone was difficult to plan due to Havous' rotation. You feel happy that you managed to get here.
		#LOC_MPE_SCI_Havous_Crew_PZ = The targeted landing to get to the exact sight of an ancient impact was very difficult to plan due to Havous' rotation. You feel very accomplished that you managed to land here.
		
		#LOC_MPE_SCI_Flake_Crew_SpaceH = Flake looks very puffy, even up close. 
		#LOC_MPE_SCI_Flake_Crew_SpaceL = Flake's surface is lumpy yet smoothed, the occasional cracks look like appealing landing challenges.
		#LOC_MPE_SCI_Flake_Crew_Landed = You might as well not even be near an object with gravity, let alone on one. Everything is still very much floating.
		#LOC_MPE_SCI_Flake_Crew_C = This canyon is quite a pretty location, but you decide this view out the window alone might not have been worth the long trip out here.
		
		#LOC_MPE_SCI_Mracksis_Crew_SpaceH1 = Mracksis is just as vibrant as they promised that it would be.
		#LOC_MPE_SCI_Mracksis_Crew_SpaceH2 = Mracksis' disk grows as you approch the planet, revealing features that remind you of the Mun.
		#LOC_MPE_SCI_Mracksis_Crew_SpaceL1 = Mracksis' surface seems more diverse than you expected, those dark circular regions may be the sight of ancient impacts.
		#LOC_MPE_SCI_Mracksis_Crew_SpaceL2 = You hear a soft thud on the side of your ship, there seem to be some small micrometeorites around Mracksis.
		#LOC_MPE_SCI_Mracksis_Crew_Landed = The reused Mun landing training simulation that you went through before launch makes sense now. Aside from the vastly different terrain of course.
		#LOC_MPE_SCI_Mracksis_Crew_G = This area is a lot brighter than the rest of Mracksis, you make to block your eyes before looking out the window.
		#LOC_MPE_SCI_Mracksis_Crew_M = You think about how you're not technically the first thing to land in this region, you're only the first to do it gently. You make a nervous glance out the window, hopefully nothing else "lands" here during your stay on the surface.
		
		#LOC_MPE_SCI_Lon_Crew_SpaceH = Lon's odd shape has earned a fair few stares even before getting close to it. It almost feels like it's a cruel joke that after such a long travel you've been met with such a ridiculous object.	
		#LOC_MPE_SCI_Lon_Crew_SpaceL = The oblong shape of Lon makes you nervous as you ensure that you're not going to run into it. The shape doesn't seem so strange up close.
		#LOC_MPE_SCI_Lon_Crew_Landed1 = You see Soden through the window and smile. This is quite a nice vantage point.
		#LOC_MPE_SCI_Lon_Crew_Landed2 = Landing was probably the easiest part of this mission.
		#LOC_MPE_SCI_Lon_Crew_Landed3 = You see the sun through the window, and suddenly you wish you were back home.
		
		#LOC_MPE_SCI_Soden_Crew_SpaceH1 = Mission control assures you that you are indeed approaching Soden, and that you're actually in its SOI. You cannot see it though, no matter how hard you squint.
		#LOC_MPE_SCI_Soden_Crew_SpaceH2 = You can just about make out Soden if you squint hard enough, but you're nearly pressing your eye against the glass to do so.
		#LOC_MPE_SCI_Soden_Crew_SpaceH3 = What you can see of Soden is quite interesting. You can't wait for a closer look after several years of nothing.
		#LOC_MPE_SCI_Soden_Crew_SpaceL1 = Soden's surface has a shocking amount of diversity, with its island like glaciers, vibrant colors, and deep trenches.
		#LOC_MPE_SCI_Soden_Crew_SpaceL2 = You wonder how deep the canyons go, and what secrets they might hold.
		#LOC_MPE_SCI_Soden_Crew_Landed = Landing this craft made you feel like you summited the highest mountain on Kerbin a thousand times over. This is the furthest dwarf planet known, and now your craft is standing on it. You are filled with pride, and maybe a bit of fear, knowing how far you've come.
		#LOC_MPE_SCI_Soden_Crew_MaC = Watching the sides of the canyon creep up on either side of you was an intense adrenaline rush.
		#LOC_MPE_SCI_Soden_Crew_MiC = Watching the sides of the canyon creep up on either side of you was quite the adrenaline rush.
		#LOC_MPE_SCI_Soden_Crew_MaG = You sit back in your seat and sigh. This has been quite the long wait, and now you're here.
		#LOC_MPE_SCI_Soden_Crew_MiG = You've summited the Kerbolar System, and you're definitely going to brag about it.
		#LOC_MPE_SCI_Soden_Crew_TS = You feel a rumble coming from underground.
		
		#LOC_MPE_SCI_Archae_Crew_SpaceH = Archae's chaotic surface implies a chaotic history. Ever since scientists back home began getting good looks at the small moon, it's been suspected that it may not have formed around Ervo at all.
		#LOC_MPE_SCI_Archae_Crew_SpaceL = The surface isn't as dark as you anticipated, which is more than relieving. You take plenty of time to look over the interesting terrain features and toss around a few explanations.
		#LOC_MPE_SCI_Archae_Crew_Landed = Some have speculated that Archae once fell apart and reformed, which is why its surface is so chaotic. You hope it stays together during your stay.
		#LOC_MPE_SCI_Archae_Crew_Crag = You feel as though you could've found a more level area to land in.
		#LOC_MPE_SCI_Archae_Crew_BF1 = You feel as though you've just landed on Minmus' distant, darker cousin.
		#LOC_MPE_SCI_Archae_Crew_BF2 = This region is very flat, aside from the scattered craters.
		#LOC_MPE_SCI_Archae_Crew_SF = This region is very flat, aside from the scattered craters.
		#LOC_MPE_SCI_Archae_Crew_B = This region stuck out to you instantly, what could possibly account for this? Tidal forces? Resurfacing? An ancient impact event? Perhaps your time here will uncover some answers.
		#LOC_MPE_SCI_Archae_Crew_GM1 = You hope these mountains have incredible views.
		#LOC_MPE_SCI_Archae_Crew_GM2 = The presence of mountains like this has implications on Archae's geologic past. Perhaps it was once active?
		
		#LOC_MPE_SCI_Ervo_Crew_SpaceH1 = You're reminded that Ervo is the reason behind the demotion of Plock, and you feel an slight irrational resentment because of that. Then you remember that Ervo is the reason behind Dres' promotion to a dwarf planet. You can''t tell if that makes you more angry or not.
		#LOC_MPE_SCI_Ervo_Crew_SpaceH2 = Many scientists considered manned missions to Ervo unpractical. Time to prove them wrong... hopefully.
		#LOC_MPE_SCI_Ervo_Crew_SpaceH3 = You keep glancing out the window for another glimpse at Ervo, exploring a new world is always exciting.
		#LOC_MPE_SCI_Ervo_Crew_SpaceH4 = From afar, it is quite easy to track the periodic motion of Archae as it orbits Ervo. The more precise the charts of Archae's orbit become, the better one can estimate the mass of Ervo.
		#LOC_MPE_SCI_Ervo_Crew_SpaceL1 = Occasionally, you can spot a small lone cloud. These clouds typically appear around the equator, and they don't last long before they precipitate.
		#LOC_MPE_SCI_Ervo_Crew_SpaceL2 = Ervo's surface is beautifully diverse. Observations have proven that Ervo is infact geologically active.
		#LOC_MPE_SCI_Ervo_Crew_SpaceL3 = The shadow of Archae among the stars as it orbits Ervo is a little intimidating.
		#LOC_MPE_SCI_Ervo_Crew_FlightH = The fact that Ervo has an atmosphere is strange to you, but its been known to exist for a long time now.
		#LOC_MPE_SCI_Ervo_Crew_FlightL = There's a strong oxygen component in the thin air. You're tempted to try and breath it in, but remember that mission control told you specifically not to do so.
		#LOC_MPE_SCI_Ervo_Crew_Landed1 = You made it. Who knows what you'll discover on this new horizon.
		#LOC_MPE_SCI_Ervo_Crew_Landed2 = The atmosphere had more of an effect than you expected during the landing, and creates a lovely haze along the horizon.
		#LOC_MPE_SCI_Ervo_Crew_Splash = As the craft floats, any metal that can rust, does. You hope that doesn't affect the craft's functionality.
		#LOC_MPE_SCI_Ervo_Crew_P = The ground made a small crunching sound when you touched down. 
		#LOC_MPE_SCI_Ervo_Crew_M = Now this is a view. You make sure to check the environment before heading out to stretch your legs.
		#LOC_MPE_SCI_Ervo_Crew_RGF1 = You've been told these glaciers are more likely cells created by local subsurface lakes. There could be a very important discovery waiting here.
		#LOC_MPE_SCI_Ervo_Crew_RGF2 = You feel what you suspect to be a small tremor. Well, there's your confirmation that at least something is moving beneath the surface.
		#LOC_MPE_SCI_Ervo_Crew_MGF = You've been told these glaciers are more likely cells created by local subsurface lakes. There could be a very important discovery waiting here.
		#LOC_MPE_SCI_Ervo_Crew_SGF = You've been told these glaciers are more likely cells created by local subsurface lakes. There could be a very important discovery waiting here.
		#LOC_MPE_SCI_Ervo_Crew_IB = This is definetly an impact basin, not dramatic enough to be responsible for Archae's formation. However, some suspect a comet hit Ervo in this very location.
		#LOC_MPE_SCI_Ervo_Crew_CB = You're excited for the beach, but then you remember it's not water. Never the less, the view should be well worth it.
		
		#LOC_MPE_SCI_Crokslev_Crew_SpaceH = You can make out the shape of the centaur through your window. It's rounder than you expected, which is a welcome surprise. The rings are thin and delicate.
		#LOC_MPE_SCI_Crokslev_Crew_SpaceL = You can't help but feel that your pictures might stur up the Kerbal Astronomical Society a bit. Crokslev's rounded shape suggests it's in equalibrium. That would make it fall into the catagory of very small dwarf planet instead of fairly large asteroid.
		#LOC_MPE_SCI_Crokslev_Crew_SpaceL_BC = This crater was named after the astronomer who discovered Crokslev, his name forms the latter half of the object's official name.
		#LOC_MPE_SCI_Crokslev_Crew_SpaceL_CeP = This central peak was named after the astronomer who discovered Crokslev's rings, his name now forms the former half of the object's offical name.
		#LOC_MPE_SCI_Crokslev_Crew_Landed = You can't help but feel that your stay at Crokslev won't be nearly as bad as it sounded during briefing. Your daydreams are interrupted by a random buzzer that you can't pinpoint. 
		
		#LOC_MPE_SCI_Geito_Crew_SpaceH = You feel pride as you approach the most famous comet known to Kerbalkind, but you're not sure you want to get too close.
		#LOC_MPE_SCI_Geito_Crew_SpaceL = You hear the patter of particles falling off Geito hitting the sides of the space craft.
		#LOC_MPE_SCI_Geito_Crew_Landed = Your not sure if you can truly "land" on an object with such weak gravity.
		
		#LOC_MPE_SCI_Lint-Mikey_Crew_SpaceH = You had never heard of 68P/Lint-Mikey before you were briefed on this mission, but once you get a good look at its shape, you have a feeling its going to become a lot more well known.
		#LOC_MPE_SCI_Lint-Mikey_Crew_SpaceL = This object could be a contact-binary, but how two comets came together when they have such weak gravity is anyone's guess.
		#LOC_MPE_SCI_Lint-Mikey_Crew_Landed = You would think "less gravity" means "easier landing." That's true, for the most part, but you're nervous you're going to fall off the comet entirely.
		
		#LOC_MPE_SCI_Zore_Crew_SpaceH = Zore's distant image is visible in the window, it's quite a strange looking world, with some very large craters visible already.
		#LOC_MPE_SCI_Zore_Crew_SpaceL = Zore's gravity seems a bit high for an object its size. When noting this to mission control, they remind you that Zore is metallic, not rocky, thus has a higher density and gravity than usual objects in its size-range. They also remind you that's the entire reason you were sent here.
		#LOC_MPE_SCI_Zore_Crew_Landed = Landing on Zore was very easy to pull off, but it was difficult to find level ground to land on, not that that matters in such low gravity of course.
		#LOC_MPE_SCI_Zore_Crew_MC = It was a little scary to watch the crater's bowl rise in the craft's windows, but ultimately harmless.
		#LOC_MPE_SCI_Zore_Crew_CF = The surface here is quite chaotic, finding a landing sight was difficult, but that's not much different than the rest of Zore.
		
		#LOC_MPE_SCI_Vant_Crew_SpaceH = Even from here, Vant looks far less irregular than most asteroids, no-doubt due to its mass.
		#LOC_MPE_SCI_Vant_Crew_SpaceL = Though the colors aren't very exciting, Vant has a multitude of diverse regions. and many large craters.
		#LOC_MPE_SCI_Vant_Crew_H = These highlands were denoted as such after a team of researchers denoted an offical shape for Vant, which placed these regions particularly far above that base shape, despite the fact that they are closer to the center of mass.
		#LOC_MPE_SCI_Vant_Crew_L = Vant's surface is rough, but it could be far worse based on what you hear about most asteroids.
		#LOC_MPE_SCI_Vant_Crew_M = You know that this cryvolcano is inactive, and has been for a very long time, but the idea of it suddenly erupting is rather frightening.
		#LOC_MPE_SCI_Vant_Crew_V = These valleys are amazing! Though, this raises questions on where they might've come from, obviously Vant couldn't have had any bodies of liquid in the past, but perhaps Vant was geologically active in relatively recent history?
		#LOC_MPE_SCI_Vant_Crew_Crat = Vant is fairly good at clearing up some of the larger objects in its region, with the obvious exceptions of Dres and Zore of course. The real question is, did these objects hit Vant, or did Vant hit them? That doesn't really matter, but it's fun to think about.
		#LOC_MPE_SCI_Vant_Crew_Crag = Lots of mounts are tightly packed together here, who knows where they came from.
		#LOC_MPE_SCI_Vant_Crew_E = The subtle rills of this equatorial depression made it quite an appealing region to visit.
		
		#LOC_MPE_SCI_Edas_Crew_SpaceH = You're glad you found Edas before it was destroyed or perturbed by Duna. Not that there was any chance of that of course, just good to be ready for anything.
		#LOC_MPE_SCI_Edas_Crew_SpaceL = While Edas is a notable asteroid compared to the usual ones found around Kerbin, it seems to share the same general features, irregular shape, smooth surface, scattered craters, and so on.
		#LOC_MPE_SCI_Edas_Crew_S = The surface is very smooth on Edas, you wonder if it's gravity is just too weak to hold onto boulders.
		#LOC_MPE_SCI_Edas_Crew_C = These craters are very smooth, and impact ejecta, dust, and debris was blown back into interplanetary space.
		#LOC_MPE_SCI_Edas_Crew_PC = This is the largest crater on Edas, and the asteroid that made it probably wouldn't even make it through Kerbin's atmosphere.
		
		// EVA Report
		#LOC_MPE_SCI_KiKi_EVA_SpaceH = You look around, and find yourself staring at Havous, and then at Ki'Ki. What luck that two strange objects happen to exist so close together.
		#LOC_MPE_SCI_KiKi_EVA_SpaceL = Ki'Ki's shape is fascinating. You wonder how many objects like Ki'Ki exist outside the orbit of distant dwarf planets.
		#LOC_MPE_SCI_KiKi_EVA_Landed = You stand on the rugged surface, and glance up at Havous. This is a strange frontier. How many people even knew that Havous and its moons existed before your mission here?
		#LOC_MPE_SCI_KiKi_EVA_CoP = This region is fun, the massive lobes on either side of you dominate the sky. You know they're stable in place, but you're still uneasy.
		
		#LOC_MPE_SCI_Kal_EVA_SpaceH = This is a lovely view, but you don't want to wander too far from your ship.
		#LOC_MPE_SCI_Kal_EVA_SpaceL = Kal almost seems as though it was made out of random chunks it picked up from the rings of Havous.
		#LOC_MPE_SCI_Kal_EVA_Landed = Kal's lumpy surface stretches... not very far. It's quite small, and you can still tell even while standing on it. Or is that just because you saw it from space and can't get its size out of your head?
		#LOC_MPE_SCI_Kal_EVA_M = Havous dominates the sky, along with its arching rings. You look out at the rugged land scape. Beautiful yet desolate.
		#LOC_MPE_SCI_Kal_EVA_P = The ground's color here matches Havous' rings. Perhaps they're connected.
		
		#LOC_MPE_SCI_Havous_EVA_SpaceH = You try not to wander too far from your ship, its been your home for awhile now. The Havous System is strangely beautiful to watch however.
		#LOC_MPE_SCI_Havous_EVA_SpaceL = You're sure to avoid getting hit with particles from the rings, but you do make sure to grab some if it's safe.
		#LOC_MPE_SCI_Havous_EVA_Landed1 = The view of Havous' rings and moons overhead is quite astonishing.
		#LOC_MPE_SCI_Havous_EVA_Landed2 = You wonder if you could make something out of the loose ice here.
		#LOC_MPE_SCI_Havous_EVA_Sc = Knowing that you're standing on the location where another dwarf planet impacted Havous is quite alarming for some reason.
		#LOC_MPE_SCI_Havous_EVA_PZ = You're standing at the exact location where Havous and another dwarf planet touched. The rings, moons, and Havous' rapid spin are all likely the result of that impact.
		#LOC_MPE_SCI_Havous_EVA_MT = The view is simply incredible.
		
		#LOC_MPE_SCI_Flake_EVA_SpaceH = You're not sure you want to be out of your ship, micrometeorites seem to be common around Flake's orbit.
		#LOC_MPE_SCI_Flake_EVA_SpaceL = You watch as the surface of Flake moves below you, you could probably get down to the surface and back again without a ship.
		#LOC_MPE_SCI_Flake_EVA_Landed = Flake is very fluffy, you're tempted to hug it.
		#LOC_MPE_SCI_Flake_EVA_C = This is a lovely view, you can't wait to show your friends and family the photos. Of course, they'll probably already have seen it.
		#LOC_MPE_SCI_Flake_EVA_P = You're standing on top of a very small world.
		
		#LOC_MPE_SCI_Mracksis_EVA_SpaceH = You put up a thumb and watch as Mracksis disappears behind it. You do the same to Kerbol. You feel a bit sad, so you move your thumb out of the way.
		#LOC_MPE_SCI_Mracksis_EVA_SpaceL = Mracksis is beautiful. You almost forget that you might end up getting hit by a micrometeorite.
		#LOC_MPE_SCI_Mracksis_EVA_Landed1 = You begin to say something inspirational, but find yourself suddenly cut off by a feeling of isolation. Kerbol is smaller than Flake in the sky.
		#LOC_MPE_SCI_Mracksis_EVA_M = These craters remind you of those on the Mun. You find that you actually miss the Mun quite a bit.
		#LOC_MPE_SCI_Mracksis_EVA_Landed2 = You sit down and look up, realizing that Mracksis isn't even the last frontier of the Kerbolar System is both exciting and terrifying. You look at the bright specks of the giant planets near Kerbol.
		
		#LOC_MPE_SCI_Lon_EVA_Space = Serenity.
		#LOC_MPE_SCI_Lon_EVA_Landed1 = Soden's orb in the sky is beautifully inspiring. It reminds you of childhood fantasies about landing on the Mun. It goes without saying that you've gone a lot further than the Mun now.
		#LOC_MPE_SCI_Lon_EVA_Landed2 = As you sit and consider the isolation of Soden and its lone moon, you find it strange that Soden only has the one. Despite its small size, its distance from Kerbol and its position beyond the densest part of the Skipper Belt means it has an astonishingly large sphere of influence. Yet... only one moon occupies it. You trace the sky with your eyes, wondering if anything else is out there.
		
		#LOC_MPE_SCI_Soden_EVA_SpaceH1 = You hum a tune that no one hears.
		#LOC_MPE_SCI_Soden_EVA_SpaceH2 = Kerbol looks like any other star, you may be approaching the limits of this solar system, but who knows! Maybe one day, Kerbal-kind will venture further still?
		#LOC_MPE_SCI_Soden_EVA_SpaceH3 = During your EVA operations you stop to glance at Soden and Lon. What secrets could they hold?
		#LOC_MPE_SCI_Soden_EVA_SpaceL = Splendid. Soden's beauty is either genuine or a result of the journey out here leaving you begging to see anything.
		#LOC_MPE_SCI_Soden_EVA_Landed1 = You kick a small stone and watch it disappear into the distance. You feel bad about that.
		#LOC_MPE_SCI_Soden_EVA_Landed2 = You put your arms on your hips in pride as you find a good place to place a flag. You've made it.
		#LOC_MPE_SCI_Soden_EVA_MaC = You look around and wonder where these canyons came from. Perhaps Soden was more active at some point in its past.
		#LOC_MPE_SCI_Soden_EVA_MiC = You look around and wonder where these canyons came from. Perhaps Soden was more active at some point in its past.
		
		#LOC_MPE_SCI_Archae_EVA_SpaceL_B = Archae's strange, flat band seems to call out to you. Where did it come from? It's a weird ring-like feature around the moon... ring... hmm. You're sure to write that down.
		#LOC_MPE_SCI_Archae_EVA_SpaceH = What a view! You try to get Archae and Ervo in the same shot just to appreciate how different they are from one another.
		#LOC_MPE_SCI_Archae_EVA_SpaceL1 = You note the amount of craters on Archae rivals every other object beyond Neidon. This further adds to the mystery of Archae's origin.
		#LOC_MPE_SCI_Archae_EVA_SpaceL2 = You wonder if Archae really is from this part of the solar system.
		#LOC_MPE_SCI_Archae_EVA_Landed = You take a moment of ease. Landing is stressful, especially after such a long trip. You take a moment to enjoy the dark landscape of Ervo's lone moon.
		
		#LOC_MPE_SCI_Ervo_EVA_SpaceH1 = You take a moment to consider every previous mission you can remember. From the Mun, to Neidon, to Plock, to beyond, the space program just keeps going further. You look at the stars, and wonder how far away they truly are.
		#LOC_MPE_SCI_Ervo_EVA_SpaceH2 = You stare at Ervo and Archae in the distance. They're almost tranquil.
		#LOC_MPE_SCI_Ervo_EVA_SpaceL = Floating among these distant objects is somewhat comforting, as if you're paying a visit to an old friend.
		#LOC_MPE_SCI_Ervo_EVA_Flight = You really want to get back into the craft. Risking your life after such a long voyage makes you anxious.
		#LOC_MPE_SCI_Ervo_EVA_Landed1 = Now this is a nice vantage point. You look at Kerbol and realize you can see everyone's house from here.
		#LOC_MPE_SCI_Ervo_EVA_Landed2 = What wonders await us here?
		#LOC_MPE_SCI_Ervo_EVA_Landed3 = You wonder if people will ever live in bases, or even colonies, on worlds beyond Plock. You chuckle, there's no way someone would be that crazy. Right?
		#LOC_MPE_SCI_Ervo_EVA_Splash = This is freezing cold and by extension not very fun. You no longer want to swim in Ervo's lakes.
		#LOC_MPE_SCI_Ervo_EVA_RGF1 = You let your mind wonder and begin to think aloud about the idea that Ervo might host life beneath its surface, quite controversially. You make several headlines because of this.
		#LOC_MPE_SCI_Ervo_EVA_RGF2 = You feel the ground shake, and you no longer want to be here.
		#LOC_MPE_SCI_Ervo_EVA_RGF3 = How far would you have to drill to reach the liquid beneath these cells?
		#LOC_MPE_SCI_Ervo_EVA_SGF = You let your mind wonder and begin to think aloud about the idea that Ervo might host life beneath its surface, quite controversially. You make several headlines because of this.
		#LOC_MPE_SCI_Ervo_EVA_MGF = You let your mind wonder and begin to think aloud about the idea that Ervo might host life beneath its surface, quite controversially. You make several headlines because of this.
		#LOC_MPE_SCI_Ervo_EVA_M = You get an eye full of the view. You're inspired by the landscape, and optimistic that your mission will inspire more people to join in your footsteps.
		#LOC_MPE_SCI_Ervo_EVA_CB = You can't wait to go for a swim, but then again, it's not going to be very pleasant.
		
		#LOC_MPE_SCI_Crokslev_EVA_SpaceH = As you check the status of your craft, you can't help but glance at Crokslev. It's like an island in a vast black sea. Mission control tells you to stop daydreaming.
		#LOC_MPE_SCI_Crokslev_EVA_SpaceL = The rings are larger than what can be seen with the naked eye, several more, very thin rings glimmer in the sun's light.
		#LOC_MPE_SCI_Crokslev_EVA_Landed = You wish you had a telescope, Sarnus and Urlum must be beautiful from here. You feel a little dizzy at the idea of seeing Kerbin from out here, only to identify a blue dot near the sun.
		#LOC_MPE_SCI_Crokslev_EVA_CeP = You declare yourself king of a very small world.
		#LOC_MPE_SCI_Crokslev_EVA_R = This is a nice field of lumps.
		#LOC_MPE_SCI_Crokslev_EVA_SP = This is a very nice field of lumps.
		#LOC_MPE_SCI_Crokslev_EVA_F = These cracks put Dres' canyon to shame.
		#LOC_MPE_SCI_Crokslev_EVA_P = You're a little sad that the rings aren't easily visible here, but with gravity so low, it wouldn't be hard to fly up for a peak.
		
		#LOC_MPE_SCI_Geito_EVA_SpaceH = When this comet gets to peribol, it's going to be quite a show for everyone on Kerbin...         ...hopefully.
		#LOC_MPE_SCI_Geito_EVA_SpaceL = This feels dangerous, you have to dodge any particularly large pieces of comet ejecta.
		#LOC_MPE_SCI_Geito_EVA_Landed = Planting a flag on a comet is a great thing to brag about, though you don't know how long a flag would last here.
		
		#LOC_MPE_SCI_Lint-Mikey_EVA_SpaceH = You wonder how long this comet will last, and if it will ever put on a particularly good show for your friends on Kerbin.
		#LOC_MPE_SCI_Lint-Mikey_EVA_SpaceL = You're a little nervous about the hitting the comet as it rotates beneath you, but when you realize how slow you're going your fears are eased, mostly.
		#LOC_MPE_SCI_Lint-Mikey_EVA_Landed = You don't feel like you've landed on Lint-Mikey, more that you've approached a large rock and put your feet lightly against it.
		
		#LOC_MPE_SCI_Zore_EVA_SpaceH = The situation is nominal, and Zore looks like a very interesting place to visit, even from here. It's strange to think about Dres and Vant being so relatively close yet so very different.
		#LOC_MPE_SCI_Zore_EVA_SpaceL = Zore has a quite chaotic surface, occasionally interrupted by large craters or gashes. Watching it slowly move as you orbit it is quite entertaining, but you need to focus on the mission.
		#LOC_MPE_SCI_Zore_EVA_RL = The dust is getting everywhere, easily kicked up by your bounds across the surface.
		#LOC_MPE_SCI_Zore_EVA_ML = You have to watch your steps, the surface is covered in chaotic rocks, tripping isn't an issue, but puncturing your spacesuit is.
		#LOC_MPE_SCI_Zore_EVA_RH = You have to watch your steps, the surface is covered in chaotic rocks, tripping isn't an issue, but puncturing your spacesuit is.
		#LOC_MPE_SCI_Zore_EVA_C = The dust is getting everywhere, easily kicked up by your bounds across the surface.
		#LOC_MPE_SCI_Zore_EVA_MC = This area is actually very smooth and solid compared to the rest of Zore's surface, not many large rocks or debris to be seen.
		#LOC_MPE_SCI_Zore_EVA_CF = You have to watch your steps, the surface is covered in chaotic rocks, some of which are quite jagged, tripping isn't an issue, but puncturing your spacesuit is.
		
		#LOC_MPE_SCI_Vant_EVA_SpaceH = You were a little scared to step out of your spacecraft, knowing that this is the asteroid belt. However, looking around you see only one, very large asteroid, which of course is Vant. You feel as though those old space operas betrayed you.
		#LOC_MPE_SCI_Vant_EVA_SpaceL = Vant's valleys look like exciting places to send rovers, though you're not sure wheeled rovers would be practical on such a small object.
		#LOC_MPE_SCI_Vant_EVA_H = You squint as hard as you can, and can't make out any other asteroids nearby. Mission control assures you this is entirely normal, asteroids are quite spread out afterall. That doesn't stop you from feeling a little disappointed however.
		#LOC_MPE_SCI_Vant_EVA_L = The gravity is very low here, this may be the largest asteroid in size, but it's certainly not the most massive.
		#LOC_MPE_SCI_Vant_EVA_Crat = These craters are a good sign that Vant, indeed, is in the asteroid belt, and has suffered many impacts because of it.
		#LOC_MPE_SCI_Vant_EVA_V = These valleys might be fun to set up a race through, though that also sounds dangerous.
		#LOC_MPE_SCI_Vant_EVA_Crag = You have to watch your step to avoid any particularly jagged rocks, puncturing your spacesuit would not be fun.
		#LOC_MPE_SCI_Vant_EVA_E = This is quite a smooth region, though it's hilly, there's not many rocks or chunks around here.
		
		#LOC_MPE_SCI_Edas_EVA_SpaceH = You note that Edas resembles a slipper, some people back at mission control chuckle.
		#LOC_MPE_SCI_Edas_EVA_SpaceL = Edas feels more like an equal than any other object you've visited. You can't help but imagine you are companions as you fly through interplanetary space together.
		#LOC_MPE_SCI_Edas_EVA_S = To say you are standing on Edas seems wrong, rather you are clinging onto it as you would a spacecraft.
		#LOC_MPE_SCI_Edas_EVA_C = You wonder how big a crater could get on an asteroid like this without the impact shattering it.
		#LOC_MPE_SCI_Edas_EVA_PC = If this impact had been any larger you wonder if Edas would've been shattered.
		
		// Mystery Goo
		#LOC_MPE_SCI_KiKi_Goo_SpaceH = The goo seems chilly.
		#LOC_MPE_SCI_KiKi_Goo_SpaceL = The goo is shivering, and seems to become jagged as a result.
		#LOC_MPE_SCI_KiKi_Goo_CoP = The goo seems to fear its surroundings.
		#LOC_MPE_SCI_KiKi_Goo_Landed = The goo seems nervous about the surroundings.
		
		#LOC_MPE_SCI_Kal_Goo_SpaceH = The goo shutters and begins to fizz.
		#LOC_MPE_SCI_Kal_Goo_SpaceL = The goo has formed a set of connected pustules. One of them bursts. It's revolting.
		#LOC_MPE_SCI_Kal_Goo_Landed = The goo has become a torus.
		
		#LOC_MPE_SCI_Havous_Goo_SpaceH = The goo is bored.
		#LOC_MPE_SCI_Havous_Goo_SpaceL = The goo spins rapidly.
		#LOC_MPE_SCI_Havous_Goo_Landed = The goo is getting very dizzy.
		#LOC_MPE_SCI_Havous_Goo_PZ = The goo seems to know what happened here.
		
		#LOC_MPE_SCI_Flake_Goo_SpaceH = The goo turns into a mass of solid chips.
		#LOC_MPE_SCI_Flake_Goo_SpaceL = The goo splinters into several fragments, it almost looks like they could be reconnected.
		#LOC_MPE_SCI_Flake_Goo_Landed = The goo seems to stare at you in disapproval.
		
		#LOC_MPE_SCI_Mracksis_Goo_Space = The goo is extremely anxious.
		#LOC_MPE_SCI_Mracksis_Goo_SpaceH = The goo seems nervous whenever red light coming off Mracksis shines into the capsule.
		#LOC_MPE_SCI_Mracksis_Goo_Landed = The goo solidifies and turns red. It's shuddering.
		
		#LOC_MPE_SCI_Lon_Goo_Space = The goo is frustrated with you.
		#LOC_MPE_SCI_Lon_Goo_SpaceL = The goo doesn't like Lon, yet it seems to eagerly look out of its container.
		#LOC_MPE_SCI_Lon_Goo_Landed = The goo has its eyes on the stars.
		
		#LOC_MPE_SCI_Soden_Goo_SpaceH = The goo waits patiently.
		#LOC_MPE_SCI_Soden_Goo_SpaceL = The goo is looking for something.
		#LOC_MPE_SCI_Soden_Goo_Landed = The goo is happy and excited.
		#LOC_MPE_SCI_Soden_Goo_TS = The goo feels close to home here.
		
		#LOC_MPE_SCI_Archae_Goo_SpaceH = The goo seems hopeful.
		#LOC_MPE_SCI_Archae_Goo_SpaceL = The goo seems to be attracted to the side of the container facing Archae.
		#LOC_MPE_SCI_Archae_Goo_Landed = The goo wants you to go further.
		
		#LOC_MPE_SCI_Ervo_Goo_SpaceH = The goo sloshes around the container before bubbling slightly.
		#LOC_MPE_SCI_Ervo_Goo_SpaceL = The goo bubbles like crazy.
		#LOC_MPE_SCI_Ervo_Goo_Flight = The goo wobbles and begins to exit the capsule. You make sure to close it a little so it doesn't completely escape.
		#LOC_MPE_SCI_Ervo_Goo_Landed = The goo is churning.
		#LOC_MPE_SCI_Ervo_Goo_Splash = The goo dissolves.
		
		#LOC_MPE_SCI_Crokslev_Goo_SpaceH = The goo glimmers, but gets shy and stops when it notices you looking.
		#LOC_MPE_SCI_Crokslev_Goo_SpaceL = The goo seems to be quite nervous.
		#LOC_MPE_SCI_Crokslev_Goo_Landed = The goo glimmers, but a little confidently. When you look it only dims slightly.
		
		#LOC_MPE_SCI_Geito_Goo_SpaceH = The goo forms a series of complex shapes that you can't quite describe. It's quite horrifying, but you feel that it's trying to tell you something. Mission control tells you to snap out of it.
		#LOC_MPE_SCI_Geito_Goo_SpaceL = It's a map, but it's not quite right yet. You can make out the position of Kerbin and its moons however. What does this mean?
		#LOC_MPE_SCI_Geito_Goo_Landed = The goo floats out the container, you see it begin to shape itself, but then it's blown away geyser, never to be seen again.
		
		#LOC_MPE_SCI_Lint-Mikey_Goo_Space = The goo wobbles and becomes a strange polygonal shape.
		#LOC_MPE_SCI_Lint-Mikey_Goo_Landed = The goo floats until it comes to rest on a chunk of ice. The chunk is then blasted into space by a geyser.
		
		#LOC_MPE_SCI_Zore_Goo_SpaceH = The goo turns orange and shatters.
		#LOC_MPE_SCI_Zore_Goo_SpaceL = Pieces of goo chip away at the inside of the container.
		#LOC_MPE_SCI_Zore_Goo_Landed = The goo is hardened, as if inspired by Zore's hard metallic nature.
		
		#LOC_MPE_SCI_Vant_Goo_Space = The goo seems to be planning something. Maybe you're just anxious.
		#LOC_MPE_SCI_Vant_Goo_Landed = The goo dissolves in a fizzy mess of bubbles.
		
		#LOC_MPE_SCI_Edas_Goo_Space = The goo feels an amazing sense of relief.
		#LOC_MPE_SCI_Edas_Goo_Landed = The goo appears to be thanking you.
		
		// Mobile Materials Lab
		#LOC_MPE_SCI_KiKi_Lab_Space = The materials slowly float out and away, some of the biosamples explode.
		#LOC_MPE_SCI_KiKi_Lab_Landed = Some materials change color, but the rest don't do a thing.
		#LOC_MPE_SCI_KiKi_Lab_CoP = One of the materials flies out of the bay rapidly, you feel like something went wrong, so you don't tell mission control about that one.
		
		#LOC_MPE_SCI_Kal_Lab_SpaceH = Some of the materials glow brightly as the reflect light from Havous and its bright rings.
		#LOC_MPE_SCI_Kal_Lab_SpaceL = Nothing happens, so you jolt the ship a little bit. One of the biosamples seem annoyed.
		#LOC_MPE_SCI_Kal_Lab_Landed = One of the crystals fall out and you lose sight of it among the diverse rocks of Kal's surface.
		#LOC_MPE_SCI_Kal_Lab_P = The materials glimmer in the bright light of Havous, you can't help but feel jealous in Havous' ability to bring out the best in others.
		
		#LOC_MPE_SCI_Havous_Lab_SpaceH = The materials swirl in the zero-g environment, you lose some of the samples to the vacuum of space.
		#LOC_MPE_SCI_Havous_Lab_SpaceL = There must have been some air trapped in the bay, because all of the materials got sucked out into space.
		#LOC_MPE_SCI_Havous_Lab_Landed = The materials are very dizzy, but you can see that gravity may be influenced by Havous' rotation.
		#LOC_MPE_SCI_Havous_Lab_P = The materials are subject to the highest gravity Havous can offer, which isn't much.
		
		#LOC_MPE_SCI_Flake_Lab_SpaceH = The materials are getting chilly.
		#LOC_MPE_SCI_Flake_Lab_SpaceL = One of the free floating materials is hit by a micrometeorite and explodes into many fine grains.
		#LOC_MPE_SCI_Flake_Lab_Landed = Most of the liquids sublimate, the only liquid left is a small amount of mystery goo that was included in the bay. Figures.
		
		#LOC_MPE_SCI_Mracksis_Lab_SpaceH = The materials are very much still there, but aside from that seem to have only become heavily irradiated by the trip out here.
		#LOC_MPE_SCI_Mracksis_Lab_SpaceL = Some of the ice samples have begun to darken, others have become pinkish.
		#LOC_MPE_SCI_Mracksis_Lab_Landed = Some of the ice samples have turned red. A lot of the samples have turned red. You realize that some fine powder-like dust was kicked into the bay by the engines upon landing. 
		#LOC_MPE_SCI_Mracksis_Lab_IF = The materials don't seem to find Mracksis very hospitable.
		#LOC_MPE_SCI_Mracksis_Lab_G = The materials are quite cold, and some of the softer samples dissolve.
		
		#LOC_MPE_SCI_Lon_Lab_Space = The materials drift slowly out into the abyss, you can't help but pity them. They don't get to come back to Kerbin.
		#LOC_MPE_SCI_Lon_Lab_Landed = The samples froze over, it's not exactly a startling discovery, but now you know for sure that Lon is, in fact, cold.
		
		#LOC_MPE_SCI_Soden_Lab_SpaceH = The samples haven't done a thing in a very long time, and even now after the bay doors open, nothing happens. It's a little sad.
		#LOC_MPE_SCI_Soden_Lab_SpaceL = The samples drift out into space, but some of them seem to sparkle before dissolving.
		#LOC_MPE_SCI_Soden_Lab_Landed = The samples fall slowly out onto Soden's chilly surface. The one biosamples that survives tries to bury itself, but doesn't get very far before it too dies. You wonder if throwing biosamples into the universe is a bad plan.
		
		#LOC_MPE_SCI_Archae_Lab_Space = Something suddenly shoots out into space and tumbles as it does so, it seems a gas canister was burst by a corrosive acid. The materials bay is a mess.
		#LOC_MPE_SCI_Archae_Lab_Landed = One of the samples drifts out and lands onto Archae's surface, it sinks and is never seen again.
		
		#LOC_MPE_SCI_Ervo_Lab_SpaceH = One of the materials begins to glow. It causes a stir among the scientific community, before it's pointed out to be a metallic material reflecting sunlight.
		#LOC_MPE_SCI_Ervo_Lab_SpaceL = The materials drift out into space and one can pick out several shapes in the resulting cloud of junk before it disperses.
		#LOC_MPE_SCI_Ervo_Lab_Flight = The materials fall out into the air, one of them sparks and catches fire.
		#LOC_MPE_SCI_Ervo_Lab_Landed = All of the metallic samples rust instantly.
		#LOC_MPE_SCI_Ervo_Lab_Splash = Some of the materials heat up a lot due to the reactive oxygen ceasing an opportunity.
		
		#LOC_MPE_SCI_Crokslev_Lab_Space = Some of the materials seem to be reflective like the rings. You wonder if this can tell you more about the make-up of the rings. It's most likely water-ice.
		#LOC_MPE_SCI_Crokslev_Lab_Landed = The materials seem quite bored, unable to appreciate where they are.
		
		#LOC_MPE_SCI_Geito_Lab_Space = Some of the more reactive metals rust as water from Geito's coma gets into the bay. You're going to be drying out the bay for days.
		#LOC_MPE_SCI_Geito_Lab_Landed = What materials don't get blown away by the comet's ejections are rusting rapidly. Most of the materials shatter when a large rock is flung into the bay.
		
		#LOC_MPE_SCI_Lint-Mikey_Lab_Space = One of the biosamples seems to be quite amazed with the comet, then you realize it was just decompressing due to space being a vacuum.
		#LOC_MPE_SCI_Lint-Mikey_Lab_Landed = You've scattered random materials across the surface and nearby space of a comet. You wonder if this experiment was worth bringing.
		
		#LOC_MPE_SCI_Zore_Lab_Space = You notice that some of the samples have become quite shiny, though the reasons why are unclear.
		#LOC_MPE_SCI_Zore_Lab_Landed = Some of the materials become quite brittle in a vacuum and crumble into fine dust.
		
		#LOC_MPE_SCI_Vant_Lab_Space = The materials seem to like Vant, at least from orbit. If "liking" means remaining mostly unchanged of course.
		#LOC_MPE_SCI_Vant_Lab_Landed = The observations you make on Vant's surface, or any other low-gravity non-atmospheric body, should be very much what you'd expect to happen in the middle of space, and they are.
		
		#LOC_MPE_SCI_Edas_Lab_Space = The materials seem relatively unchanged, apart from the usual decompression, boiling, freezing you would expect from a vacuum.
		#LOC_MPE_SCI_Edas_Lab_Landed = Just bringing the bay here has brought Edas a great deal more material diversity than it has ever seen.
		
		// Temperature
		#LOC_MPE_SCI_KiKi_Temp_Space = It's cold out here. Most substances found on Kerbin would be solid.
		#LOC_MPE_SCI_KiKi_Temp_Landed = Ki'Ki seems to absorb a fair amount of heat, however it doesn't have any significant effects on the object. Ki'Ki radiates heat from its dark side, and this raises questions about how stable Ki'Ki's orbit is in the long term.
		
		#LOC_MPE_SCI_Kal_Temp_Space = The low temperatures might allow for a large amount of volatiles to exist on Kal's surface.
		#LOC_MPE_SCI_Kal_Temp_Landed = Kal is very cold, like everything else in the Havous System.
		#LOC_MPE_SCI_Kal_Temp_L = Kal's rubble fields are darker, and thus absorb slightly more heat.
		
		#LOC_MPE_SCI_Havous_Temp_Space = It's not exactly pleasant out here.
		#LOC_MPE_SCI_Havous_Temp_Landed = Havous is the coldest body in the Havous System.
		#LOC_MPE_SCI_Havous_Temp_Sc = There's a little bit of heat trapped below the surface here.
		#LOC_MPE_SCI_Havous_Temp_PZ = There's a fair amount of heat trapped below the surface here.
		
		#LOC_MPE_SCI_Flake_Temp_Space = The low temperatures might imply that Flake is entirely volatiles, which has been suggested by some planetary scientists.
		#LOC_MPE_SCI_Flake_Temp_Landed = There is no internal heat at all coming from Flake.
		
		#LOC_MPE_SCI_Mracksis_Temp_Space = The low temperatures are exactly as expected.
		#LOC_MPE_SCI_Mracksis_Temp_Landed = Mracksis is geologically dead, there's no heat coming from under ground.
		
		#LOC_MPE_SCI_Lon_Temp_Space = This is one of the coldest locations ever seen.
		#LOC_MPE_SCI_Lon_Temp_Landed = As if it wasn't cold enough in the day, it gets worse at night.
		
		#LOC_MPE_SCI_Soden_Temp_Space = The temperature drops very slowly as you continue to approach Soden.
		#LOC_MPE_SCI_Soden_Temp_SpaceL = This could very well be the coldest part of the Kerbolar System.
		#LOC_MPE_SCI_Soden_Temp_Landed = One could wonder if Soden at its furthest point from the sun gets a significant fraction of heat from other stars. When you suggest that idea people laugh at you, and you realize just how far other stars really are.
		#LOC_MPE_SCI_Soden_Temp_TS = Below the surface, Soden isn't quite as cold as one might thing, there seems to be a heatsource below this region.
		
		#LOC_MPE_SCI_Archae_Temp_Space = Yep, it's pretty cold.
		#LOC_MPE_SCI_Archae_Temp_Landed = There's a faint heat coming from below the ground. Residual heat from recent impact events, perhaps?
		
		#LOC_MPE_SCI_Ervo_Temp_Space = Wow, it's pretty cold out here.
		#LOC_MPE_SCI_Ervo_Temp_Flight = The cold air causes a layer of frost to build up on the thermometer. Many people doubted an atmosphere could ever exist out here, yet here it is.
		#LOC_MPE_SCI_Ervo_Temp_Landed = It's often debated whether or not Ervo could host any form of light weather despite the low solar energy levels. Checking the temperature just casts more doubt on that idea.
		#LOC_MPE_SCI_Ervo_Temp_Splash = It's just barely too hot for liquid oxygen on the surface of the lakes, it seems that Ervo is slowly losing its oxygen. Who knows how much it might've had in the past.
		#LOC_MPE_SCI_Ervo_Temp_P = It's just cold enough for stable oxygen ice here, this may be the only permanent oxygen on Ervo.
		#LOC_MPE_SCI_Ervo_Temp_MGF = There's some subsurface heating here.
		#LOC_MPE_SCI_Ervo_Temp_SGF = There's some subsurface heating here.
		#LOC_MPE_SCI_Ervo_Temp_RGF = There's some subsurface heating here.
		#LOC_MPE_SCI_Ervo_Temp_M = Temperature lowers with elevation, just like on Kerbin.
		
		#LOC_MPE_SCI_Crokslev_Temp_Space = It's cold enough for methane to be an ice out here, perhaps we'll find some.
		#LOC_MPE_SCI_Crokslev_Temp_Landed = The object has relatively hot days and terribly cold nights.
		
		#LOC_MPE_SCI_Geito_Temp_Space = It's cold, but as the comet approaches Kerbol, it's going to get a whole lot hotter.
		#LOC_MPE_SCI_Geito_Temp_Landed = As the comet warms up, things are getting more exciting, geysers erupt, the coma gets larger, and the heartrate of everyone at mission control gets way faster.
		
		#LOC_MPE_SCI_Lint-Mikey_Temp_Space = As Lint-Mikey orbits the sun, it experiences a lot of temperature shifting. It gets colder than Vall at its furthest, and almost as warm as the Mun at its closest.
		#LOC_MPE_SCI_Lint-Mikey_Temp_Landed = The comet shows no signs of internal heating. Its geysers only erupt on the day side however.
		
		#LOC_MPE_SCI_Zore_Temp_Space = You know, measuring the temperature of space seems to be impossible and what-not, but the craft itself does get warmer or colder based on where it is in the solar system, which is probably a much more helpful reading to take. For instance, here it's cold enough for ice to exist, though large ice deposits might not survive unless and object had permanantly shadowed regions, or a high gravitational pull. Thus, one can hypothesize that Zore will have little to no ice.
		#LOC_MPE_SCI_Zore_Temp_Landed = The temperature changes drastically as Zore rotates.
		
		#LOC_MPE_SCI_Vant_Temp_Space = Vant being icy seems strange, perhaps it formed much further from Kerbol than it is now.
		#LOC_MPE_SCI_Vant_Temp_Landed = During the day, Vant's surface is too hot for ice to survive, you wonder if this means that as Vant moved inwards that it had a very large comet-like tail.
		
		#LOC_MPE_SCI_Edas_Temp_Space = Edas gets a fair amount of seasonal heating and cooling due to its eccentric orbit.
		#LOC_MPE_SCI_Edas_Temp_Landed = Edas' surface changes drastically in temperature due to its lack of atmosphere. The heat radiating off the surface during the night might be able to move Edas slowly, like a very low energy thruster.
		
		// Barometer
		#LOC_MPE_SCI_KiKi_Bar_Space = There's no atmosphere here.
		#LOC_MPE_SCI_KiKi_Bar_Landed = Nothing to see here, just the vacuum of space.
		
		#LOC_MPE_SCI_Kal_Bar_Space = There's nothing here, maybe try getting closer?
		#LOC_MPE_SCI_Kal_Bar_SpaceL = There's no atmosphere here... try getting a bit closer.
		#LOC_MPE_SCI_Kal_Bar_Landed = There's no atmosphere here after all. Glad that mystery is solved.
		
		#LOC_MPE_SCI_Havous_Bar_Space = There's nothing out here to read.
		#LOC_MPE_SCI_Havous_Bar_Landed = Havous might not be able to hold onto an atmosphere.
		
		#LOC_MPE_SCI_Flake_Bar_Space = Well, if you count the occasional bit of dust or micrometeorite, then there's something here. The instrument however, reads zero flat.
		#LOC_MPE_SCI_Flake_Bar_Landed = Flake and objects like it could never hold an atmosphere according to all models. This observation confirms those models.
		
		#LOC_MPE_SCI_Mracksis_Bar_Space = There's not much to see here, and there's no atmosphere either.
		#LOC_MPE_SCI_Mracksis_Bar_Landed = There's a very, very thin exosphere of xenon.
		
		#LOC_MPE_SCI_Lon_Bar_Space = Well, no atmosphere to be found.
		#LOC_MPE_SCI_Lon_Bar_Landed = You find the lack of atmosphere disturbing.
		
		#LOC_MPE_SCI_Soden_Bar_Space = Atmospheres don't usually stretch this far into space. The one you're trying to measure doesn't even exist.
		#LOC_MPE_SCI_Soden_Bar_Landed = Nothing to see here.
		#LOC_MPE_SCI_Soden_Bar_TS = There's a very occasional tick on the barometer, there might be a very thin, local exosphere here.
		
		#LOC_MPE_SCI_Archae_Bar_Space = No atmosphere to be found.
		#LOC_MPE_SCI_Archae_Bar_Landed = There's a lack of atmosphere, which to some scientists is quite shocking, due to Ervo's atmosphere being very much real.
		
		#LOC_MPE_SCI_Ervo_Bar_Space = You're not going to read any atmosphere yet.
		#LOC_MPE_SCI_Ervo_Bar_FlightH = There's an atmosphere here, it's very thin.
		#LOC_MPE_SCI_Ervo_Bar_FlightL = The atmosphere is the thickest observed beyond Plock, but that's not saying much.
		
		#LOC_MPE_SCI_Crokslev_Bar = There's a good search effort put towards finding any exosphere at all, but none is ever found.
		
		#LOC_MPE_SCI_Geito_Bar = The coma's density can be measured with this barometer, but it has to be used very carefully to do so.
		
		#LOC_MPE_SCI_Lint-Mikey_Bar = The coma's density can be measured with this barometer, but it has to be used extremely carefully to do so.
		
		#LOC_MPE_SCI_Zore_Bar_Space = There's nothing out here, it's unlikely Zore would have any atmosphere at all.
		#LOC_MPE_SCI_Zore_Bar_Landed = Zore has no atmosphere at all.
		
		#LOC_MPE_SCI_Vant_Bar_Space = It would be quite a surprise if even the biggest asteroid had any reasonable atmosphere, so far it looks like Vant doesn't.
		#LOC_MPE_SCI_Vant_Bar_Landed = Nothing to see here, you're disappointed but not surprised.
		
		#LOC_MPE_SCI_Edas_Bar = There's nothing at all here.
		
		// Gravity
		#LOC_MPE_SCI_KiKi_Grav_Space = This tiny moon doesn't have very strong gravity.
		#LOC_MPE_SCI_KiKi_Grav_MaL = This lobe has a slightly higher mass than its twin.
		#LOC_MPE_SCI_KiKi_Grav_MiL = This lobe has a slightly lower mass than its twin.
		#LOC_MPE_SCI_KiKi_Grav_CoP = There's a slight pull from either side of the craft coming from the lobes.
		
		#LOC_MPE_SCI_Kal_Grav_Space = Even this close to Kal, there's still a strong pull from Havous, well, a relatively strong pull.
		#LOC_MPE_SCI_Kal_Grav_Landed = There is some doubt about the stability of Kal, Havous might be pulling it apart.
		
		#LOC_MPE_SCI_Havous_Grav_Space = Havous is pretty small, so the pull isn't incredible. Never the less, it's still enough for Havous to host moons and a ring system.
		#LOC_MPE_SCI_Havous_Grav_Landed = The gravity on Havous is quite strange, due to its rotation and shape, the closer you go to the poles, the stronger gravity gets.
		#LOC_MPE_SCI_Havous_Grav_P = This is the strongest surface gravity Havous has to offer, and it's not much.
		
		#LOC_MPE_SCI_Flake_Grav_Space = It's shocking this moon can even hold itself together.
		#LOC_MPE_SCI_Flake_Grav_Landed = Mracksis is expected to rip Flake apart in the near future, well, near in astronomical terms.
		
		#LOC_MPE_SCI_Mracksis_Grav_Space = Mracksis' gravity is slightly weaker than the Mun's.
		#LOC_MPE_SCI_Mracksis_Grav_Landed = The surface gravity is ever so slightly higher than expected, Mracksis might have a very small rocky core.
		
		#LOC_MPE_SCI_Lon_Grav_Space1 = Observe, the gravitational strength of a potato.
		#LOC_MPE_SCI_Lon_Grav_Space2 = It's not much, but it's enough for Lon.
		#LOC_MPE_SCI_Lon_Grav_Landed = Lon's orbit is slightly off. It's so slight that it could never have been noticed from Kerbin, it might not have even been noticable from Soden.
		
		#LOC_MPE_SCI_Soden_Grav_Space = Soden is so far from Kerbol, that even its minimal gravity has a huge SOI. It's a wonder that Soden has only capture one moon. Or perhaps... it only has one KNOWN moon?
		#LOC_MPE_SCI_Soden_Grav_SpaceL = There's a slight tug that doesn't fit with Soden or Lon, it's miniscule but it shouldn't be there.
		#LOC_MPE_SCI_Soden_Grav_Landed = This was an easy landing, the gravity here is really low.
		
		#LOC_MPE_SCI_Archae_Grav_Space = This is the second largest moon known around a dwarf planet, its gravity is similar to that of Minmus.
		#LOC_MPE_SCI_Archae_Grav_Landed = The readings bug out for a few seconds before correcting themselves.
		
		#LOC_MPE_SCI_Ervo_Grav_Space = Behold, the gravity of the largest dwarf planet. Honestly, it's not really that much is it?
		#LOC_MPE_SCI_Ervo_Grav_Flight = Ervo has just enough gravity to hold its thin atmosphere in place, but it seems to be losing it slowly to space.
		#LOC_MPE_SCI_Ervo_Grav_Landed = It's impressive how little worlds with little gravity can hold a fair amount in place.
		#LOC_MPE_SCI_Ervo_Grav_Splash = Good thing these sensors detect particles instead of force, the buoyancy counteracts the force of gravity slightly.
		
		#LOC_MPE_SCI_Crokslev_Grav_Space = There's not much to be found, yet this object holds rings.
		#LOC_MPE_SCI_Crokslev_Grav_Landed = How could an impact ever be so gentle that it allowed material to be captured by such a small object?
		
		#LOC_MPE_SCI_Geito_Grav_Space = You're not quite familiar with measuring using micro-gees, but you have to here.
		#LOC_MPE_SCI_Geito_Grav_Landed = This gravity is probably not going to do a very good job of holding you down.
		
		#LOC_MPE_SCI_Lint-Mikey_Grav_Space = You are able to measure the micro-gee environment here up to four decimal places, this should help find a stable orbit to park in.
		#LOC_MPE_SCI_Lint-Mikey_Grav_Landed = With such low gravity, you should really consider attaching to Lint-Mikey instead of hoping for the best.
		
		#LOC_MPE_SCI_Zore_Grav_Space = With new, more accurate observations of Zore's shape and size, just by looking at the gravity data one can deduce and confirm Zore's long suspected metallic composition.
		#LOC_MPE_SCI_Zore_Grav_Landed = Zore's surface gravity is quite high for objects of its size, but it's exactly what was expected for a metal world.
		
		#LOC_MPE_SCI_Vant_Grav_Space = By looking at the low gravity of Vant and comparing it with its size, it's quite easy to figure out that Vant is mostly ice.
		#LOC_MPE_SCI_Vant_Grav_Landed = Vant's surface gravity is quite low for an object of its size, but it's exactly what you'd expect for an ice world.
		
		#LOC_MPE_SCI_Edas_Grav_Space = Not much to be seen in terms of gravity, you wonder how much your ship is pulling Edas as opposed to Edas pulling your craft.
		#LOC_MPE_SCI_Edas_Grav_Landed = The microgravity is the opposite of intense. Some form of coupling to Edas is recommended.
		
		// Seismic
		#LOC_MPE_SCI_KiKi_Seis = There's no activity here, which is good, you wouldn't want the lobes to collapse while you're on the surface.
		
		#LOC_MPE_SCI_Kal_Seis = There's a few very small tremors very few minutes, it seems Havous' weak gravity is still enough to tug at Kal.
		
		#LOC_MPE_SCI_Havous_Seis_Landed = Havous seems to be geologically dead.
		#LOC_MPE_SCI_Havous_Seis_G = The glaciers are slowly moving across the surface.
		
		#LOC_MPE_SCI_Flake_Seis = There's not much activity here at all. It's expected that that might change one day, when Flake becomes a ring system around Mracksis.
		
		#LOC_MPE_SCI_Mracksis_Seis_Landed = Mracksis is a dead world.
		#LOC_MPE_SCI_Mracksis_Seis_G = The glaciers are barely moving.
		
		#LOC_MPE_SCI_Lon_Seis = Nothing to see here, although there's evidence that there might have been some tidal activity here a long time ago.
		
		#LOC_MPE_SCI_Soden_Seis_Landed = Well, it's not much, but there does seem to be some weak geologic activity here on Soden. Soden is probably not going to be geologically active much longer, in fact it's debatable if Soden even counts as it is today.
		#LOC_MPE_SCI_Soden_Seis_TS = This seems to be the origin of the small tremors, the subsurface lakes must be freezing over.
		
		#LOC_MPE_SCI_Archae_Seis = Archae is far enough away to avoid any tidal stress from Ervo, so how did Archae's surface get the way it is now?
		
		#LOC_MPE_SCI_Ervo_Seis_Landed = There are weak tremors here on Ervo, this is a geologically active world for sure.
		#LOC_MPE_SCI_Ervo_Seis_M = This is a convergent boundary, Ervo might have a liquid interior globally.
		#LOC_MPE_SCI_Ervo_Seis_RGF = There's some strong activity here, this may be a thin area in the crust above the subsurface ocean.
		#LOC_MPE_SCI_Ervo_Seis_MGF = There's a good amount of activity under this area.
		#LOC_MPE_SCI_Ervo_Seis_SGF = There's a good amount of activity under this area.
		
		#LOC_MPE_SCI_Crokslev_Seis = Crokslev seems to be completely dead.
		
		#LOC_MPE_SCI_Geito_Seis = You can detect rather large eruptions as the comet approaches the Sun.
		
		#LOC_MPE_SCI_Lint-Mikey_Seis = You can detect faint blips as geysers erupt from the comet.
		
		#LOC_MPE_SCI_Zore_Seis_Landed = Zore seems to be dead geologically.
		#LOC_MPE_SCI_Zore_Seis_CF = Zore may be dead, but this region may prove that Zore was at one point active, though the rest of the evidence has been lost to time.
		
		#LOC_MPE_SCI_Vant_Seis = Vant's seismic activity is a boring flatline, which is a real shame, because the surface suggests that Vant was at one point very active.
		
		#LOC_MPE_SCI_Edas_Seis = Edas is very dead, it's unlikely it ever had any activity at all.
		
		// Asteroid Sample
		#LOC_MPE_SCI_Soden_Ast_Space = You've given Soden and Lon a new friend, you know that if they were alive they would thank you warmly.
		#LOC_MPE_SCI_Soden_Ast_Landed = This is the first time another celestial body has ever gently hugged Soden, if they were alive, they'd be crying tears of joy.
		
		// Magnetometer
		#LOC_MPE_SCI_Ervo_Mag_SpaceH = Ervo's tenuous at best atmosphere seems to produce a lot of charged particles as the Kerbolar wind slams against it, even at this distance, a star's might is clearly displayed.
		#LOC_MPE_SCI_Ervo_Mag_SpaceL = There is no detectable magnetic field being generated by Ervo's interior, however, there does seem to be some amount of geologic activity occuring on the surface. Perhaps Ervo's mantle remains molten, while the core has frozen?
		
		#LOC_MPE_SCI_Zore_Mag_SpaceH = Scientists have eagerly awaited the results of a magnetometer experiment in the space around Zore, so far at this distance nothing of note seems to be present.
		#LOC_MPE_SCI_Zore_Mag_SpaceL = It's weak, but most certainly there! The magnetometer detects a very weak, but steady magnetic dipole emitting from Zore, it could very be that this is confirmation that Zore is the once-molten now-exposed core of a long gone protoplanet.
		
		#LOC_MPE_SCI_Vant_Mag_SpaceH = Vant is, magnetically speaking, very dead. However, there have been meteors found on Kerbin originating from Vant that show that at some point, billions of years ago, Vant did indeed generate a magnetic field. Perhaps very weak residuals of this field still remain on the surface?
		#LOC_MPE_SCI_Vant_Mag_SpaceL = No matter how hard the data is scrutinized, there sadly there seems to be no indication that Vant has any magnetic field left to show.
		
		#LOC_MPE_SCI_Soden_Mag_SpaceH = Nothing of note in regards to Soden can be said, however, Soden is most certainly, without a doubt, beyond the heliopause, as the spacecraft definetly passed it on the way out. The radiation of the interstellar medium must be blasting Soden constantly, and perhaps that will influence its magnetic environment.
		#LOC_MPE_SCI_Soden_Mag_SpaceL = While Soden does not have much in the way of an atmosphere, there is certainly, an exceptionally faint ionosphere. Its shape and structure is molded by not just Kerbol's winds, but also the interstellar medium. This has tremendous implications for studying how icy dwarf planets and other far-flung objects are impacted by not being shielded by Kerbol's magnetic field.
		
		#LOC_MPE_SCI_Havous_Mag_SpaceH = Havous has no magnetic field, not that planetary scientists back home were ever holding their breath about that.
		#LOC_MPE_SCI_Havous_Mag_SpaceL = There remains no indication of a magnetic field around Havous, however there are some ionized particles being blasted away from Havous' surface by the solar wind. This might imply some subtle amount of cryovolcanism on Havous, but it might also just be that occasionally Havous sublimates some amount of material. 
		
		#LOC_MPE_SCI_Edas_Mag = There is not a hint of magnetic activity in space around Edas, unless of course you count the Sun's.
		
		#LOC_MPE_SCI_Lint-Mikey_Mag_SpaceH = While 68P is certainly too small to generate a strong magnetic field, it most certainly seems that its coma has some interesting interactions with the solar wind. In fact, there is a very, very faint aurora, visible only in UV light.
		#LOC_MPE_SCI_Lint-Mikey_Mag_SpaceL = There is a very weak magnetic field around 68P, and this field is likely a remnant of the comet's formation within Kerbol's protoplanetary disk.
		
		#LOC_MPE_SCI_Geito_Mag = Geito's tail seems to generate some form of magnetic field, it forms a bowshock and wake as Geito travels the Kerbolar System.
		
		#LOC_MPE_SCI_Crokslev_Mag = Crokslev has no magnetic field, but with how closely it may interact with the magnetic fields of giant planets, it may very well be that Crokslev's surface or interior have some amount of polarized material.
		
		#LOC_MPE_SCI_Mracksis_Mag = Mracksis absolutely has no magnetic field of note, but its red coloration is a result of surface ices interacting with the solar wind, meaning while not directly pushing back on the solar wind, Mracksis still has interesting interactions with it.
		
		#LOC_MPE_SCI_KiKi_Mag = Ki'Ki has no magnetic interactions with Havous or the The Sun, though if it was at some point a comet, it may have at one point in its history.
		
		#LOC_MPE_SCI_Kal_Mag = Honestly, I don't know what we expect from this... Well yeah, I mean, it's important to check but- I mean it's Kal. I know, I know it's just... oh wait. Data is coming back now. Yeah, see? Nothing.
		
		#LOC_MPE_SCI_Flake_Mag = It would honestly be rather incredible, almost ground breaking, if this little ball of icy fuzz generated a magnetic field, sadly but not surprisingly, it does not.
		
		#LOC_MPE_SCI_Lon_Mag = Lon occasionally seems to get blasted by ion tails streaming off Soden's weak ionosphere, and these tails seem to fly off in a rather choatic manner. However, Lon itself does not seem to respond with any magnetic or ionic properties of its own.
		
		#LOC_MPE_SCI_Archae_Mag_SpaceH = Archae, of the two objects in the Ervo System, is less likely to host a magnetic field. So far, it doesn't seem to.
		#LOC_MPE_SCI_Archae_Mag_SpaceL = Shockingly, there do seem to be small regions on the surface generating localized magnetic fields, this is similar to activity observed on the Mun, which brings a very strange familiarity to such an alien system.
		
		// Atmosphere Analysis
		#LOC_MPE_SCI_Ervo_Atmo_FlightH = There seems to be a lot more oxygen in Ervo's upper atmosphere, perhaps since it has less to react with up here? No matter the reasons why Ervo's atmosphere seems to have higher oxygen concentrations up here, it does make everyone a little nervous about how the spacecraft might react, or rather, how this oxygen might react with it.
		#LOC_MPE_SCI_Ervo_Atmo_FlightL = Oxygen levels are decreasing now, this is likely because the surface absorbs most of the oxygen into it as it oxidizes. However, it never seems to go away at any altitude.
		#LOC_MPE_SCI_Ervo_Atmo_Landed = The oxygen-nitrogen atmosphere of Ervo almost reflects that of Kerbin's atmosphere oh-so-far away from here. However, this concentration of oxygen is most certainly toxic. A quick breath might not hurt, or... perhaps might hurt a lot. It might just depends on the Kerbal taking that bitter Ervo-air in.
		#LOC_MPE_SCI_Ervo_Atmo_Splash = There's a sort of... oxygen-steam coming off of these lakes. It's a rather exotic feature, though does seem to imply that the oxygen in this lakes travelled here from further off the equator through rivers. These lakes might be better described as "seas."
		
	}
}
