@Kopernicus:BEFORE[MPE]
{
    MPE_Settings
    {
        GeitoNerf = True // True or False, defaults to True
        MinorPlanetNumbers = True // True or False, defaults to True
    }
}
//EXPLANATIONS
//GeitoNerf - Reduces Geito's inclination for easier gameplay, to be more accurate to Halley's Comet IRL. Useful for missions recreating the Halley Armada.
//MinorPlanetNumbers – adds Kerbal Astronomical Union minor planet numbers to the display names of MPE objects
